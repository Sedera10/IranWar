# IranWar - Docker Compose
version: '3.8'
services:
  # Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iranwar_web
    ports:
      - "83:80"
    volumes:
      - .:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=iranwar_db
      - DB_USER=admin
      - DB_PASS=admin
    restart: always
    networks:
      - iranwar_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Base de données MySQL
  db:
    image: mysql:8.0
    container_name: iranwar_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: iranwar_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/database.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - iranwar_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

  # phpMyAdmin (Interface DB)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: iranwar_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: admin
      PMA_PASSWORD: admin
      UPLOAD_LIMIT: 50M
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - iranwar_network

# Volumes persistants
volumes:
  mysql_data:
    driver: local

# Réseau
networks:
  iranwar_network:
    driver: bridge
